<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
<title>烏骨雞炸雞 — Silkie Fried Chicken</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Sans+JP:wght@400;500;700;900&family=Noto+Sans+KR:wght@400;500;700;900&family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=Ma+Shan+Zheng&family=ZCOOL+XiaoWei&family=Noto+Serif+TC:wght@400;600;900&family=Cubic+11&display=swap" rel="stylesheet" />
<style>
  :root {
    --ink: #0e0e0e;
    --ink-2: #1a1a1a;
    --ink-3: #2a2625;
    --gold: #d4a24c;
    --gold-2: #e6b865;
    --gold-soft: #f5e3bf;
    --paper: #fbf7ef;
    --line: rgba(212, 162, 76, 0.22);
    --muted: #7a716a;
    --danger: #c9472b;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter', 'Noto Sans TC', 'Noto Sans JP', 'Noto Sans KR', system-ui, sans-serif;
    background: #0a0a0a;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    overscroll-behavior-y: contain;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: radial-gradient(circle at 50% 30%, rgba(212,162,76,0.06), transparent 70%), #0a0a0a;
    z-index: -1;
  }
  .phone {
    width: 375px;
    margin: 0 auto;
    background: var(--paper);
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
  }

  /* ── Lang bar ── */
  .lang-bar {
    position: sticky; top: 0; z-index: 50;
    background: var(--ink);
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .brand-mark {
    display: flex; align-items: center; gap: 8px;
    font-family: 'Bebas Neue', 'Noto Sans TC', sans-serif;
    letter-spacing: 0.06em; font-size: 18px; color: var(--gold);
  }
  .brand-mark .dot {
    width: 16px; height: 16px; border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, var(--gold-2), var(--gold) 60%, #8c6a2b);
    box-shadow: 0 0 0 2px var(--ink), 0 0 0 3px var(--gold);
    flex: 0 0 16px;
  }
  .lang-tabs { display: flex; gap: 4px; }
  .lang-tabs button {
    appearance: none; background: transparent;
    border: 1px solid transparent; color: rgba(255,255,255,0.55);
    font: 600 11px/1 'Inter', sans-serif; padding: 7px 9px;
    border-radius: 999px; cursor: pointer; letter-spacing: 0.02em;
  }
  .lang-tabs button.active { background: var(--gold); color: var(--ink); border-color: var(--gold); }

  /* ── Hero ── */
  .hero {
    position: relative; background: var(--ink); color: #fff;
    padding: 22px 22px 36px; overflow: hidden;
  }
  .hero::after {
    content: ''; position: absolute; left: 0; right: 0; bottom: -1px; height: 18px;
    background: radial-gradient(circle at 9px 0, var(--paper) 9px, transparent 10px) 0 0 / 18px 18px;
  }
  .hero-eyebrow {
    color: var(--gold); font: 600 10px/1 'Inter', sans-serif;
    letter-spacing: 0.32em; text-transform: uppercase; margin-bottom: 10px;
  }
  .hero h1 {
    margin: 0 0 6px;
    font-family: var(--title-font, 'Noto Sans TC', sans-serif);
    font-weight: 900; font-size: 34px; line-height: 1.1; letter-spacing: 0.02em;
  }
  .hero-sub {
    font: 500 12px/1.4 'Inter', 'Noto Sans TC', sans-serif;
    color: rgba(255,255,255,0.6); letter-spacing: 0.04em;
  }
  .hero-image {
    margin-top: 18px; width: 100%; aspect-ratio: 4/3;
    border-radius: 14px; overflow: hidden;
    background: #1a1a1a; border: 1px solid rgba(212,162,76,0.3);
    position: relative;
  }
  .hero-image img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .hero-image::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(180deg, transparent 60%, rgba(0,0,0,0.5));
    pointer-events: none;
  }
  .hero-meta { margin-top: 16px; display: grid; gap: 10px; }
  .meta-row {
    display: flex; align-items: flex-start; gap: 10px;
    font: 500 12px/1.4 'Inter', 'Noto Sans TC', 'Noto Sans JP', 'Noto Sans KR', sans-serif;
    color: rgba(255,255,255,0.85);
  }
  .meta-ico {
    width: 22px; height: 22px; flex: 0 0 22px;
    border-radius: 6px; background: rgba(212,162,76,0.12); color: var(--gold);
    display: grid; place-items: center; font-size: 11px;
  }
  .meta-lbl {
    color: var(--gold); font-weight: 600; font-size: 10px;
    letter-spacing: 0.18em; text-transform: uppercase; display: block; margin-bottom: 2px;
  }
  .meta-val { color: #fff; font-size: 13px; line-height: 1.4; }
  .meta-val a { color: #fff; text-decoration: none; border-bottom: 1px dotted var(--gold); }
  .call-btn {
    margin-top: 14px; display: flex; align-items: center; justify-content: center; gap: 8px;
    background: var(--gold); color: var(--ink); border: none; border-radius: 10px;
    padding: 12px; font: 700 13px/1 'Inter', 'Noto Sans TC', sans-serif;
    letter-spacing: 0.04em; width: 100%; cursor: pointer; text-decoration: none;
  }

  /* ── Category bar ── */
  .cat-bar {
    position: sticky; top: 42px; z-index: 40;
    background: var(--paper); border-bottom: 1px solid var(--line);
    padding: 10px 14px; display: flex; gap: 8px;
    overflow-x: auto; scrollbar-width: none;
  }
  .cat-bar::-webkit-scrollbar { display: none; }
  .cat-bar button {
    flex: 0 0 auto; appearance: none; background: transparent;
    border: 1px solid var(--line); color: var(--ink-3);
    font: 600 12px/1 'Inter', 'Noto Sans TC', 'Noto Sans JP', 'Noto Sans KR', sans-serif;
    padding: 8px 14px; border-radius: 999px; white-space: nowrap; cursor: pointer;
    letter-spacing: 0.02em;
  }
  .cat-bar button.active { background: var(--ink); color: var(--gold); border-color: var(--ink); }

  /* ── Sections ── */
  .section { padding: 18px 16px 8px; scroll-margin-top: 100px; }
  .section-head {
    display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 12px;
  }
  .section-head h2 {
    margin: 0; font-family: 'Bebas Neue', 'Noto Sans TC', sans-serif;
    font-weight: 700; font-size: 28px; letter-spacing: 0.04em; color: var(--ink);
  }
  .section-head .count {
    font: 500 10px/1 'Inter', sans-serif; color: var(--muted);
    letter-spacing: 0.16em; text-transform: uppercase;
  }

  /* ── Card ── */
  .card {
    display: flex; gap: 12px; background: #fff; border: 1px solid var(--line);
    border-radius: 14px; padding: 12px; margin-bottom: 12px;
    cursor: pointer; position: relative;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .card:active { transform: scale(0.985); box-shadow: 0 6px 18px rgba(0,0,0,0.08); }
  .card-thumb {
    width: 84px; height: 84px; flex: 0 0 84px; border-radius: 10px;
    background: linear-gradient(135deg, var(--ink-2), var(--ink-3));
    display: grid; place-items: center; font-size: 38px;
    overflow: hidden; position: relative;
  }
  .card-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .card-thumb::after {
    content: ''; position: absolute; inset: 0; pointer-events: none;
    background: repeating-linear-gradient(45deg, rgba(212,162,76,0.0) 0 12px, rgba(212,162,76,0.06) 12px 13px);
  }
  .card-body { flex: 1; min-width: 0; display: flex; flex-direction: column; }
  .card-title {
    font-family: 'Noto Sans TC', 'Noto Sans JP', 'Noto Sans KR', 'Inter', sans-serif;
    font-weight: 700; font-size: 16px; line-height: 1.25;
    color: var(--ink); margin-bottom: 4px; text-wrap: pretty;
  }
  .card-note {
    font: 500 11px/1.4 'Inter', 'Noto Sans TC', 'Noto Sans JP', 'Noto Sans KR', sans-serif;
    color: var(--muted); margin-bottom: 6px;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .card-bottom {
    margin-top: auto; display: flex; align-items: flex-end;
    justify-content: space-between; gap: 8px;
  }
  .price-list { display: flex; flex-direction: column; gap: 2px; }
  .price-row {
    display: flex; align-items: baseline; gap: 6px;
    font: 600 11px/1.2 'Inter', 'Noto Sans TC', 'Noto Sans JP', 'Noto Sans KR', sans-serif;
  }
  .price-row .opt { color: var(--muted); font-weight: 500; }
  .price-row .pval { color: var(--ink); font-weight: 700; font-size: 14px; font-family: 'Inter', sans-serif; }
  .price-row .curr { color: var(--gold); font-weight: 700; font-size: 11px; }
  .market-txt { color: var(--danger); font-weight: 700; font-size: 14px; }
  .tag-row { display: flex; flex-wrap: wrap; gap: 4px; justify-content: flex-end; max-width: 130px; }
  .tag {
    display: inline-flex; align-items: center; gap: 3px;
    background: var(--gold-soft); color: var(--ink-2);
    border-radius: 999px; padding: 3px 7px;
    font: 600 10px/1 'Inter', 'Noto Sans TC', 'Noto Sans JP', 'Noto Sans KR', sans-serif;
    white-space: nowrap;
  }
  .tag.spicy { background: #fde0d6; color: #8a2818; }
  .tag.recommend { background: var(--ink); color: var(--gold); }
  .tag.meat { background: #ead7c0; color: #5a3a1f; }
  .tag.veg { background: #d8ead4; color: #2e5a26; }
  .tag.halal { background: #d6e6f0; color: #1f4a6b; }
  .tag .ic { font-size: 11px; line-height: 1; }

  /* ── Footer ── */
  .footer {
    margin-top: 12px; padding: 26px 16px 40px;
    background: var(--ink); color: rgba(255,255,255,0.6);
    text-align: center; font: 500 10px/1.6 'Inter', 'Noto Sans TC', sans-serif;
    letter-spacing: 0.06em;
  }
  .footer .mark {
    color: var(--gold); font-family: 'Bebas Neue', 'Noto Sans TC', sans-serif;
    letter-spacing: 0.16em; font-size: 14px; margin-bottom: 8px;
  }

  /* ── Modal ── */
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 100;
    display: none; align-items: flex-end; justify-content: center;
    backdrop-filter: blur(4px);
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    width: 375px; max-width: 100vw; height: 90vh;
    background: var(--paper); border-radius: 18px 18px 0 0;
    overflow: hidden; display: flex; flex-direction: column;
    animation: slideUp 0.28s ease;
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-photo {
    position: relative; flex: 0 0 240px;
    background: linear-gradient(135deg, var(--ink), var(--ink-3));
    overflow: hidden; display: grid; place-items: center;
    color: var(--gold); font-size: 100px; touch-action: pinch-zoom;
  }
  .modal-photo img { width: 100%; height: 100%; object-fit: cover; touch-action: pinch-zoom; }
  .modal-pinch {
    position: absolute; bottom: 10px; right: 10px;
    background: rgba(0,0,0,0.55); color: rgba(255,255,255,0.85);
    font: 500 10px/1 'Inter', sans-serif; letter-spacing: 0.08em;
    padding: 6px 8px; border-radius: 6px;
  }
  .modal-close {
    position: absolute; top: 12px; right: 12px;
    width: 36px; height: 36px; border-radius: 50%; border: none;
    background: rgba(0,0,0,0.55); color: #fff; font-size: 18px;
    cursor: pointer; display: grid; place-items: center; z-index: 2;
  }
  .modal-body { flex: 1; overflow-y: auto; padding: 18px 20px 28px; }
  .modal-title {
    font-family: 'Noto Sans TC', 'Noto Sans JP', 'Noto Sans KR', sans-serif;
    font-weight: 900; font-size: 22px; line-height: 1.2; color: var(--ink); margin-bottom: 10px;
  }
  .modal-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 14px; }
  .modal-prices {
    display: flex; flex-direction: column; gap: 8px;
    border-top: 1px solid var(--line); border-bottom: 1px solid var(--line);
    padding: 12px 0; margin-bottom: 14px;
  }
  .modal-price-row {
    display: flex; align-items: baseline; justify-content: space-between;
    font: 600 14px/1.2 'Inter', 'Noto Sans TC', 'Noto Sans JP', 'Noto Sans KR', sans-serif;
  }
  .modal-price-row .opt { color: var(--ink-3); font-weight: 500; }
  .modal-price-row .pval { color: var(--ink); font-weight: 800; font-size: 18px; }
  .modal-price-row .curr { color: var(--gold); font-size: 12px; margin-right: 2px; }
  .modal-block { margin-bottom: 14px; }
  .modal-block .lbl {
    font: 700 10px/1 'Inter', sans-serif; color: var(--gold);
    letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 6px;
  }
  .modal-block .txt {
    font: 500 13px/1.55 'Inter', 'Noto Sans TC', 'Noto Sans JP', 'Noto Sans KR', sans-serif;
    color: var(--ink-3);
  }
</style>
</head>

// ── Helpers ────────────────────────────────────────────────
function tagClass(code) {
  if (code === 'R') return 'tag recommend';
  if (['1','2','3'].includes(code)) return 'tag spicy';
  if (['P','B','L'].includes(code)) return 'tag meat';
  if (['V','V5'].includes(code)) return 'tag veg';
  if (code === 'H') return 'tag halal';
  return 'tag';
}
function renderTagHtml(code) {
  const t = tagInfo[code]; if (!t) return '';
  return '<span class="' + tagClass(code) + '"><span class="ic">' + t.icon + '</span>' + t.label[lang] + '</span>';
}
function fmtPrice(p) {
  if (p.value === 'market') return '<span class="market-txt">' + i18n[lang].market + '</span>';
  return '<span class="curr">NT$</span><span class="pval">' + p.value + '</span>';
}

// ── Render ─────────────────────────────────────────────────
function applyHero() {
  const d = i18n[lang];
  document.getElementById('h-eyebrow').textContent = d.eyebrow;
  document.getElementById('h-name').textContent = d.shopName;
  document.getElementById('h-tagline').textContent = d.tagline;
  document.getElementById('brand-name').textContent = d.brandMark;
  document.getElementById('lbl-address').textContent = d.addressLbl;
  document.getElementById('val-address').textContent = d.address;
  document.getElementById('lbl-phone').textContent = d.phoneLbl;
  document.getElementById('lbl-hours').textContent = d.hoursLbl;
  document.getElementById('val-hours').textContent = d.hours;
  document.getElementById('btn-call').textContent = d.callShop;
  document.getElementById('footer-note').textContent = d.footerNote;
  document.documentElement.lang = lang === 'zh' ? 'zh-Hant' : lang === 'ja' ? 'ja' : lang === 'ko' ? 'ko' : 'en';
}

function renderCatBar() {
  const bar = document.getElementById('cat-bar');
  bar.innerHTML = categories.map((c, i) =>
    '<button data-cat="' + c.id + '"' + (i === 0 ? ' class="active"' : '') + '>' + c.label[lang] + '</button>'
  ).join('');
  bar.querySelectorAll('button').forEach(function(btn) {
    btn.addEventListener('click', function() {
      const sec = document.getElementById('sec-' + btn.dataset.cat);
      if (sec) { window.scrollTo({ top: sec.getBoundingClientRect().top + window.scrollY - 98, behavior: 'smooth' }); }
    });
  });
}

function renderSections() {
  const root = document.getElementById('sections');
  root.innerHTML = categories.map(function(c) {
    const items = menuItems.filter(function(it) { return it.category === c.id; });
    return '<section class="section" id="sec-' + c.id + '" data-cat="' + c.id + '">'
      + '<div class="section-head"><h2>' + c.label[lang] + '</h2><span class="count">' + String(items.length).padStart(2,'0') + ' ITEMS</span></div>'
      + items.map(renderCard).join('')
      + '</section>';
  }).join('');
  root.querySelectorAll('.card').forEach(function(card) {
    card.addEventListener('click', function() { openModal(card.dataset.id); });
  });
}

function renderCard(it) {
  const note = it.note[lang];
  return '<div class="card" data-id="' + it.id + '">'
    + '<div class="card-thumb">' + (it.image ? '<img src="images/' + it.image + '" alt="" loading="lazy" />' : '<span>' + it.emoji + '</span>') + '</div>'
    + '<div class="card-body">'
    + '<div class="card-title">' + it.names[lang] + '</div>'
    + (note ? '<div class="card-note">' + note + '</div>' : '')
    + '<div class="card-bottom">'
    + '<div class="price-list">'
    + it.price.map(function(p) {
        return '<div class="price-row">'
          + (p.label ? '<span class="opt">' + p.label[lang] + '</span>' : '')
          + fmtPrice(p)
          + '</div>';
      }).join('')
    + '</div>'
    + '<div class="tag-row">' + (it.tags || []).map(renderTagHtml).join('') + '</div>'
    + '</div></div></div>';
}

// ── Modal ──────────────────────────────────────────────────
function openModal(id) {
  const it = menuItems.find(function(x) { return x.id === id; });
  if (!it) return;
  savedScroll = window.scrollY;

  document.getElementById('modal-title').textContent = it.names[lang];
  document.getElementById('modal-emoji').textContent = it.emoji || '🍽';
  document.getElementById('modal-tags').innerHTML = (it.tags || []).map(renderTagHtml).join('');
  document.getElementById('modal-pinch').textContent = i18n[lang].pinch;
  document.getElementById('lbl-desc').textContent = i18n[lang].descLbl;
  document.getElementById('lbl-notes').textContent = i18n[lang].notesLbl;

  document.getElementById('modal-prices').innerHTML = it.price.map(function(p) {
    return '<div class="modal-price-row">'
      + '<span class="opt">' + (p.label ? p.label[lang] : '—') + '</span>'
      + '<span>' + (p.value === 'market'
          ? '<span class="market-txt">' + i18n[lang].market + '</span>'
          : '<span class="curr">NT$</span><span class="pval">' + p.value + '</span>')
      + '</span></div>';
  }).join('');

  const desc = (it.desc && it.desc[lang] || '').trim();
  const note = (it.note && it.note[lang] || '').trim();
  const dBlk = document.getElementById('modal-desc-block');
  const nBlk = document.getElementById('modal-note-block');
  dBlk.style.display = desc ? 'block' : 'none';
  nBlk.style.display = note ? 'block' : 'none';
  if (desc) document.getElementById('modal-desc').textContent = desc;
  if (note) document.getElementById('modal-note').textContent = note;

  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
  window.scrollTo({ top: savedScroll });
}
document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal').addEventListener('click', function(e) { if (e.target.id === 'modal') closeModal(); });

// ── Lang switch ────────────────────────────────────────────
function setLang(l) {
  lang = l;
  document.querySelectorAll('#lang-tabs button').forEach(function(b) {
    b.classList.toggle('active', b.dataset.lang === l);
  });
  applyHero();
  renderCatBar();
  renderSections();
}
document.querySelectorAll('#lang-tabs button').forEach(function(b) {
  b.addEventListener('click', function() { setLang(b.dataset.lang); });
});

// ── Active category on scroll ──────────────────────────────
window.addEventListener('scroll', function() {
  var active = categories[0].id;
  categories.forEach(function(c) {
    var sec = document.getElementById('sec-' + c.id);
    if (sec && sec.getBoundingClientRect().top - 110 <= 0) active = c.id;
  });
  document.querySelectorAll('#cat-bar button').forEach(function(b) {
    b.classList.toggle('active', b.dataset.cat === active);
  });
}, { passive: true });

// ── Init ───────────────────────────────────────────────────
applyHero();
renderCatBar();
renderSections();
</script>

function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' ? keyOrEdits : { [keyOrEdits]: val };
    setValues(prev => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return { tweaks: values, setTweak };
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const panelRef = React.useRef(null);
  const offsetRef = React.useRef({ r: 16, b: 16 });

  React.useEffect(() => {
    const onMsg = e => {
      if (e.data?.type === '__activate_edit_mode') setOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = e => {
    const panel = panelRef.current; if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const sr = window.innerWidth - r.right, sb = window.innerHeight - r.bottom;
    const move = ev => {
      const nr = Math.max(8, sr - (ev.clientX - sx));
      const nb = Math.max(8, sb - (ev.clientY - sy));
      offsetRef.current = { r: nr, b: nb };
      panel.style.right = nr + 'px'; panel.style.bottom = nb + 'px';
    };
    const up = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
    window.addEventListener('mousemove', move); window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return <>
    <style>{__TWK_CSS}</style>
    <div ref={panelRef} className="twk-panel"
         style={{ right: offsetRef.current.r, bottom: offsetRef.current.b }}>
      <div className="twk-hd" onMouseDown={onDragStart}>
        <b>{title}</b>
        <button className="twk-x" onMouseDown={e => e.stopPropagation()} onClick={dismiss}>✕</button>
      </div>
      <div className="twk-body">{children}</div>
    </div>
  </>;
}

  s.setProperty('--gold', m.gold);
  s.setProperty('--gold-soft', m.goldSoft);
  s.setProperty('--ink', m.ink);
  s.setProperty('--muted', m.muted);

  "cardStyle": "floating",
  "titleFont": "Noto Sans TC"
}/*EDITMODE-END*/;

function MenuTweaks() {
  const { tweaks, setTweak } = useTweaks(TWEAK_DEFAULTS);

  React.useEffect(() => { applyMood(tweaks.mood); }, [tweaks.mood]);
  React.useEffect(() => { applyCardStyle(tweaks.cardStyle); }, [tweaks.cardStyle]);
  React.useEffect(() => {
    const f = FONT_OPTIONS.find(f => f.value === tweaks.titleFont) || FONT_OPTIONS[0];
    applyFont(f.value, f.weight);
  }, [tweaks.titleFont]);

  // Run on mount too
  React.useEffect(() => {
    applyMood(tweaks.mood);
    applyCardStyle(tweaks.cardStyle);
    const f = FONT_OPTIONS.find(f => f.value === tweaks.titleFont) || FONT_OPTIONS[0];
    applyFont(f.value, f.weight);
  }, []);

  const currentFont = FONT_OPTIONS.find(f => f.value === tweaks.titleFont) || FONT_OPTIONS[0];

  return (
    <TweaksPanel title="Tweaks">

      {/* Mood */}
      <div className="twk-sect">整體氛圍 Mood</div>
      <div className="twk-chips">
        {Object.entries(MOODS).map(([key, m]) => (
          <button key={key} className="twk-chip" data-on={tweaks.mood === key ? '1' : '0'}
                  onClick={() => setTweak('mood', key)}>
            <span className="swatch" style={{ background: m.heroBg, border: '1.5px solid ' + m.gold }}></span>
            {m.label}
          </button>
        ))}
      </div>

      {/* Card style */}
      <div className="twk-sect">卡片風格 Cards</div>
      <div className="twk-chips">
        {Object.entries(CARD_STYLES).map(([key, cs]) => {
          const labels = { rounded: '圓角', sharp: '方角', floating: '浮動' };
          return (
            <button key={key} className="twk-chip" data-on={tweaks.cardStyle === key ? '1' : '0'}
                    onClick={() => setTweak('cardStyle', key)}
                    style={{ borderRadius: cs.radius, boxShadow: cs.shadow || '0 1px 4px rgba(0,0,0,.06)' }}>
              <span style={{ fontSize: 10, fontWeight: 600 }}>{labels[key]}</span>
            </button>
          );
        })}
      </div>

      {/* Title font */}
      <div className="twk-sect">店名字體 Title Font</div>
      <div className="twk-row">
        <select className="twk-sel" value={tweaks.titleFont}
                onChange={e => setTweak('titleFont', e.target.value)}>
          {FONT_OPTIONS.map(f => <option key={f.value} value={f.value}>{f.label} — {f.value}</option>)}
        </select>
        <div style={{
          marginTop: 6, padding: '10px 12px', background: '#111',
          borderRadius: 8, textAlign: 'center',
          fontFamily: "'" + tweaks.titleFont + "', 'Noto Sans TC', sans-serif",
          fontSize: 22, color: MOODS[tweaks.mood]?.gold || '#d4a24c',
          fontWeight: currentFont.weight, lineHeight: 1.2,
        }}>烏骨雞炸雞</div>
      </div>

    </TweaksPanel>
  );
}

const tweakRoot = document.createElement('div');
document.body.appendChild(tweakRoot);
ReactDOM.createRoot(tweakRoot).render(<MenuTweaks />);
</script>
</body>
</html>
